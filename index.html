<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070809">
<title>Гараж — учёт авто</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070809;--bg2:#0d0f13;
  --surface:rgba(255,255,255,.035);--surface-2:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.14);
  --text:#f4f6fa;--muted:#8c95a6;--muted-2:#5c6473;
  --accent:#5b9dff;--accent-dim:#3d7fd0;--accent-soft:rgba(91,157,255,.13);
  --blue:#5b9dff;--blue-light:#5b9dff;--violet:#5b9dff;--red:#5b9dff;
  --amber:#5b9dff;--green:#5b9dff;--purple:#5b9dff;--teal:#5b9dff;
  --radius:20px;--radius-sm:14px;
  --shadow:0 18px 50px -18px rgba(0,0,0,.7);
  --m-stripe:linear-gradient(90deg,transparent 0%,rgba(91,157,255,.55) 50%,transparent 100%);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--text);
  line-height:1.5;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(1000px 600px at 12% -8%,rgba(91,157,255,.14),transparent 60%),
  radial-gradient(900px 700px at 95% 8%,rgba(91,157,255,.07),transparent 58%),
  radial-gradient(800px 600px at 50% 115%,rgba(91,157,255,.06),transparent 62%)}
.mono{font-family:'JetBrains Mono',monospace}
.wrap{max-width:880px;margin:0 auto;padding:0 18px 120px}
button{font-family:inherit}

/* ===== Onboarding ===== */
.onb{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 24px;gap:6px}
.onb .car-ic{width:96px;height:96px;border-radius:28px;display:grid;place-items:center;margin-bottom:22px;
  background:linear-gradient(135deg,rgba(28,105,212,.22),rgba(111,66,193,.18));border:1px solid var(--border-strong);box-shadow:var(--shadow)}
.onb .car-ic svg{width:50px;height:50px;color:var(--blue-light)}
.onb h1{font-size:27px;font-weight:800;letter-spacing:-.5px}
.onb p{font-size:15px;color:var(--muted);max-width:340px;margin:8px 0 26px}
.onb .feats{display:flex;gap:18px;margin-bottom:30px;flex-wrap:wrap;justify-content:center}
.onb .feat{display:flex;flex-direction:column;align-items:center;gap:7px;width:88px}
.onb .feat .fi{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;background:var(--surface);border:1px solid var(--border)}
.onb .feat .fi svg{width:22px;height:22px}
.onb .feat span{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.25}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  background:linear-gradient(180deg,rgba(7,8,9,.94),rgba(7,8,9,.6));border-bottom:1px solid var(--border)}
.topbar-inner{max-width:880px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:13px}
.car-switch{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:8px 13px 8px 9px;cursor:pointer;transition:all .2s;flex:1;min-width:0}
.car-switch:hover{border-color:var(--border-strong);background:var(--surface-2)}
.car-av{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:grid;place-items:center;
  font-weight:800;font-size:15px;color:#fff;background-size:cover;background-position:center}
.car-info{min-width:0;flex:1}
.car-info b{font-size:15px;font-weight:800;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.car-info span{font-size:11.5px;color:var(--muted);font-weight:600}
.car-switch .chev{color:var(--muted-2);flex-shrink:0}
.car-switch .chev svg{width:18px;height:18px;display:block}
.odo-chip{display:flex;flex-direction:column;align-items:flex-end;padding:7px 13px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .2s;flex-shrink:0}
.odo-chip:hover{border-color:var(--border-strong);background:var(--surface-2)}
.odo-chip span{font-size:9.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.odo-chip b{font-size:14px;font-weight:700;white-space:nowrap}
.odo-chip b small{font-size:10px;color:var(--muted);font-weight:600}
.mstripe{height:3px;width:100%;background:var(--m-stripe);opacity:.95}

/* ===== sections ===== */
.sec-title{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  margin:24px 4px 14px;display:flex;align-items:center;gap:8px}
.sec-title::before{content:"";width:16px;height:2px;background:var(--blue-light);border-radius:2px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 16px 18px;box-shadow:var(--shadow);transition:transform .25s,border-color .25s}
.stat:hover{transform:translateY(-3px);border-color:var(--border-strong)}
.stat .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;margin-bottom:12px}
.stat .ic svg{width:19px;height:19px}
.stat .lbl{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.25}
.stat .val{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:3px}
.stat .val small{font-size:12px;color:var(--muted);font-weight:600}
.stat .sub{font-size:11px;color:var(--muted-2);font-weight:600;margin-top:2px}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-top:22px;box-shadow:var(--shadow)}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.panel-head h3{font-size:14px;font-weight:700}
.panel-head .tot{font-size:13px;color:var(--muted);font-weight:600}
.bars{display:flex;flex-direction:column;gap:13px}
.bar-row{display:grid;grid-template-columns:104px 1fr auto;align-items:center;gap:12px}
.bar-row .name{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.track{height:9px;border-radius:6px;background:rgba(255,255,255,.06);overflow:hidden}
.fill{height:100%;border-radius:6px;width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}
.bar-row .amt{font-size:12.5px;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:64px;text-align:right}

/* ===== records ===== */
.filters{display:flex;gap:9px;margin:6px 0 16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.chip.active{background:#fff;color:#0a0c10;border-color:#fff}
.chip .cnt{font-size:11px;padding:1px 7px;border-radius:20px;background:rgba(255,255,255,.1);font-weight:700}
.chip.active .cnt{background:rgba(10,12,16,.12)}
.records{display:flex;flex-direction:column;gap:11px}
.rec{display:flex;align-items:flex-start;gap:14px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:15px 16px;transition:transform .2s,border-color .2s,background .2s;cursor:pointer}
.rec:hover{transform:translateX(3px);border-color:var(--border-strong);background:var(--surface-2)}
.rec .ricon{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:grid;place-items:center}
.rec .ricon svg{width:21px;height:21px}
.rec .body{flex:1;min-width:0}
.rec .ttl{font-size:15px;font-weight:700;line-height:1.3;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rec .note{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4}
.rec .meta{display:flex;align-items:center;gap:9px;margin-top:9px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:600;padding:4px 9px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.tag svg{width:12px;height:12px;opacity:.8}
.badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;text-transform:uppercase;letter-spacing:.5px}
.badge.plan{background:rgba(255,255,255,.07);color:var(--muted)}
.badge.soon{background:rgba(91,157,255,.2);color:#9cc4ff}
.badge.sched{background:rgba(255,255,255,.06);color:var(--muted)}
.rec .right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.rec .cost{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.rec .cost.zero{color:var(--muted-2)}
.del{opacity:0;background:transparent;border:none;color:var(--muted-2);cursor:pointer;padding:4px;border-radius:6px;transition:all .2s}
.rec:hover .del{opacity:1}
.del:hover{color:var(--red);background:rgba(226,34,39,.1)}
.del svg{width:16px;height:16px;display:block}
.empty{text-align:center;padding:54px 20px;color:var(--muted-2)}
.empty svg{width:50px;height:50px;opacity:.35;margin-bottom:14px}
.empty p{font-size:14px;font-weight:600;max-width:300px;margin:0 auto}

/* ===== charts ===== */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.chart-card h3{font-size:14px;font-weight:700;margin-bottom:4px}
.chart-card .ch-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.chart-card svg{display:block;width:100%;overflow:visible}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px}
.legend .li{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600}
.donut-wrap{display:flex;align-items:center;gap:22px}
.donut-center{text-align:center}
.donut-center b{font-size:20px;font-weight:800;display:block}
.donut-center span{font-size:11px;color:var(--muted);font-weight:600}

/* ===== bottom nav ===== */
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:45;display:flex;align-items:center;gap:4px;
  background:rgba(16,18,22,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-strong);border-radius:20px;padding:7px;box-shadow:0 16px 40px -10px rgba(0,0,0,.7)}
.nav button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;
  color:var(--muted);cursor:pointer;padding:8px 16px;border-radius:14px;transition:all .2s;font-weight:700;font-size:10.5px}
.nav button svg{width:21px;height:21px}
.nav button.active{color:var(--text);background:var(--surface-2)}
.nav button.add{flex:0 0 auto;width:52px;height:52px;padding:0;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dim));color:#fff;
  box-shadow:0 8px 20px -6px rgba(91,157,255,.55),inset 0 1px 1px rgba(255,255,255,.25)}
.nav button.add svg{width:25px;height:25px}
.nav button.add:hover{filter:brightness(1.1);transform:translateY(-1px)}
.nav button.add:active{transform:scale(.95)}

/* ===== sheet/modal ===== */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(3,4,6,.72);backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:auto}
.sheet{width:100%;max-width:520px;max-height:92vh;overflow-y:auto;background:linear-gradient(180deg,var(--bg2),#08090b);
  border:1px solid var(--border-strong);border-bottom:none;border-radius:26px 26px 0 0;padding:8px 22px 30px;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.22,1,.36,1)}
.overlay.open .sheet{transform:translateY(0)}
@media(min-width:560px){.overlay{align-items:center}.sheet{border-radius:24px;border-bottom:1px solid var(--border-strong);max-height:88vh}
  .overlay:not(.open) .sheet{transform:translateY(20px)}}
.grab{width:42px;height:5px;border-radius:5px;background:var(--border-strong);margin:6px auto 18px}
.sheet h2{font-size:19px;font-weight:800;margin-bottom:4px}
.sheet .ssub{font-size:13px;color:var(--muted);margin-bottom:20px}
.type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.type-opt{padding:12px 4px;border-radius:13px;background:var(--surface);border:1px solid var(--border);cursor:pointer;text-align:center;transition:all .2s}
.type-opt:hover{border-color:var(--border-strong)}
.type-opt.sel{border-color:currentColor;background:var(--surface-2)}
.type-opt svg{width:20px;height:20px;margin-bottom:5px}
.type-opt span{font-size:10.5px;font-weight:700;color:var(--text);display:block}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;padding:13px 15px;border-radius:13px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:15px;font-family:inherit;transition:border-color .2s,background .2s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue-light);background:var(--surface-2)}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:11.5px;color:var(--muted-2);margin-top:6px;line-height:1.4}
.calc-box{background:rgba(34,201,201,.08);border:1px solid rgba(34,201,201,.2);border-radius:13px;padding:12px 15px;margin-bottom:16px;font-size:13px;color:var(--teal);font-weight:600;display:none}
.calc-box.show{display:block}
.toggle{display:flex;align-items:center;gap:11px;padding:13px 15px;border-radius:13px;background:var(--surface);border:1px solid var(--border);cursor:pointer;margin-bottom:18px}
.toggle .sw{width:44px;height:26px;border-radius:20px;background:rgba(255,255,255,.12);position:relative;flex-shrink:0;transition:background .2s}
.toggle .sw::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .22s}
.toggle.on .sw{background:var(--green)}
.toggle.on .sw::after{transform:translateX(18px)}
.toggle .tx b{font-size:14px;font-weight:700;display:block}
.toggle .tx small{font-size:12px;color:var(--muted)}
.actions{display:flex;gap:11px;margin-top:8px}
.btn{flex:1;padding:15px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-primary{background:linear-gradient(135deg,var(--blue),#0c3f96);color:#fff;box-shadow:0 8px 22px -8px rgba(28,105,212,.7)}
.btn-primary:hover{filter:brightness(1.1)}
.btn-danger{background:rgba(226,34,39,.12);border:1px solid rgba(226,34,39,.3);color:#ff6065;flex:0 0 auto;padding:15px 18px}
.btn-block{width:100%;margin-top:6px}
.car-list-item{display:flex;align-items:center;gap:13px;padding:13px;border-radius:15px;background:var(--surface);border:1px solid var(--border);cursor:pointer;margin-bottom:10px;transition:all .2s}
.car-list-item:hover{border-color:var(--border-strong);background:var(--surface-2)}
.car-list-item.active{border-color:var(--blue-light)}
.car-list-item .ed{margin-left:auto;color:var(--muted-2);background:transparent;border:none;cursor:pointer;padding:6px}
.car-list-item .ed svg{width:17px;height:17px;display:block}
.color-pick{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.color-pick input[type=color]{width:52px;height:48px;padding:4px;border:1px solid var(--border);border-radius:13px;background:var(--surface);cursor:pointer;flex-shrink:0}
.color-pick input[type=color]::-webkit-color-swatch-wrapper{padding:0}
.color-pick input[type=color]::-webkit-color-swatch{border:none;border-radius:9px}
.color-pick input[type=text]{flex:1;min-width:120px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
.swatches{display:flex;gap:7px;width:100%;flex-wrap:wrap}
.sw-dot{width:30px;height:30px;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s}
.sw-dot:hover{transform:scale(1.12)}
.sw-dot.on{border-color:#fff}

.tools{display:flex;gap:10px;justify-content:center;margin-top:30px;flex-wrap:wrap}
.tool-btn{font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--border);
  padding:9px 16px;border-radius:11px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s}
.tool-btn:hover{color:var(--text);border-color:var(--border-strong)}
.tool-btn svg{width:15px;height:15px}

@media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}.stat .val{font-size:20px}
  .bar-row{grid-template-columns:88px 1fr auto}.type-grid{grid-template-columns:repeat(5,1fr)}.type-opt span{font-size:9.5px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="app"></div>

<!-- Add record sheet -->
<div class="overlay" id="recOverlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="grab"></div>
    <h2 id="recTitle">Новая запись</h2>
    <p class="ssub">Выбери тип и заполни детали</p>
    <div class="type-grid" id="typeGrid"></div>
    <form id="recForm">
      <div class="field">
        <label for="fTitle" id="lblTitle">Название</label>
        <input id="fTitle" placeholder="Напр. Замена масла">
      </div>
      <div id="fuelFields" style="display:none">
        <div class="field-row">
          <div class="field"><label for="fLiters">Литры</label><input id="fLiters" type="number" inputmode="decimal" step="0.01" placeholder="45"></div>
          <div class="field"><label for="fPpl">Цена за литр</label><input id="fPpl" type="number" inputmode="decimal" step="0.01" placeholder="1.85"></div>
        </div>
        <div class="calc-box" id="fuelCalc"></div>
      </div>
      <div class="field"><label for="fNote">Заметка <span style="color:var(--muted-2);font-weight:500">(необязательно)</span></label>
        <textarea id="fNote" placeholder="Детали, артикулы, АЗС…"></textarea></div>
      <div class="field-row">
        <div class="field"><label for="fDate">Дата</label><input id="fDate" type="date"></div>
        <div class="field"><label for="fMileage">Пробег, км</label><input id="fMileage" type="number" inputmode="numeric" step="1" placeholder="245000"></div>
      </div>
      <div class="field"><label for="fCost" id="lblCost">Стоимость</label><input id="fCost" type="number" inputmode="decimal" step="0.01" placeholder="0"></div>
      <div class="toggle" id="doneToggle"><div class="sw"></div>
        <div class="tx"><b id="toggleLabel">Выполнено</b><small id="toggleSub">уже сделано / оплачено</small></div></div>
      <div class="actions">
        <button type="button" class="btn btn-danger" id="recDelete" style="display:none" aria-label="Удалить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
        <button type="button" class="btn btn-ghost" id="recCancel">Отмена</button>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<!-- Car sheet (add/edit) -->
<div class="overlay" id="carOverlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="grab"></div>
    <h2 id="carTitle">Добавить авто</h2>
    <p class="ssub">Базовые данные машины. Подробности можно добавить позже.</p>
    <form id="carForm">
      <div class="field-row">
        <div class="field"><label for="cMake">Марка</label><input id="cMake" required placeholder="BMW"></div>
        <div class="field"><label for="cModel">Модель</label><input id="cModel" placeholder="5 series"></div>
      </div>
      <div class="field-row">

  inbox:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',
  download:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  upload:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'
};
const ACCENT='#5b9dff';
// monochrome blue ramp — categories differ by lightness, not hue
const TYPES = {
  service:  {label:'ТО',          color:'#7fb4ff', soft:'rgba(127,180,255,.13)'},
  fuel:     {label:'Заправка',    color:'#5b9dff', soft:'rgba(91,157,255,.13)'},
  expense:  {label:'Расход',      color:'#3d7fd0', soft:'rgba(61,127,208,.14)'},
  upgrade:  {label:'Улучшение',   color:'#2b5f9e', soft:'rgba(43,95,158,.16)'},
  reminder: {label:'Напоминание', color:'#a9ccff', soft:'rgba(169,204,255,.13)'}
};

/* ============ STATE ============ */
const KEY='garage_v2';
let state, ui={tab:'overview', filter:'all', recType:'service', recDone:true, editRec:null, editCar:null, carDone:true};

function seed(){
  return {
    activeCarId:'car1',
    cars:[{id:'car1',make:'BMW',model:'',year:null,plate:'',engine:'',bought:'',currency:'€',color:'#5b9dff',mileage:245000}],

      {id:'s1',carId:'car1',type:'service',title:'Замена масла в двигателе',note:'+ фильтр салона и воздушный',date:'2025-12-10',mileage:239000,cost:0,done:true},
      {id:'s2',carId:'car1',type:'service',title:'Замена масла в двигателе',note:'+ масляный фильтр',date:'2026-04-08',mileage:245000,cost:0,done:true},
      {id:'s3',carId:'car1',type:'service',title:'Демпферный шкив коленвала + ремень',note:'',date:'2025-12-10',mileage:239000,cost:300,done:true},

      {id:'r1',carId:'car1',type:'reminder',title:'Следующая замена масла',note:'Интервал ~10 000 км или раз в год',date:'2027-04-08',mileage:255000,cost:0,done:false}
    ]
  };
}
function load(){ try{const r=localStorage.getItem(KEY); if(r) return JSON.parse(r);}catch(e){} return seed(); }
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function uid(){ return 'x'+Math.abs(Date.now()^(performance.now()*1000|0)).toString(36); }
state=load();

/* ============ HELPERS ============ */
const activeCar = ()=> state.cars.find(c=>c.id===state.activeCarId) || state.cars[0];
const carRecords = ()=> state.records.filter(r=>r.carId===state.activeCarId);
const cur = ()=> (activeCar()?.currency)||'€';
const fmtN = n=> new Intl.NumberFormat('ru-RU').format(Math.round(n));
const fmtMoney = n=> `${fmtN(n)} ${cur()}`;
const fmtKm = n=> n==null?'—':`${fmtN(n)} км`;
function fmtDate(d){ if(!d) return null; const [y,m,day]=d.split('-');
  const mo=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y.slice(2)}`; }
const esc = s=> (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// fuel economy: tank-to-tank average across all fuel records for active car
function fuelStats(){
  const f = carRecords().filter(r=>r.type==='fuel' && r.mileage!=null && r.liters>0)
    .slice().sort((a,b)=>a.mileage-b.mileage);
  if(f.length<2) return {avg:null, eurPerKm:null, segments:[], totalL:0, totalCost:0, count:f.length};
  const dist = f[f.length-1].mileage - f[0].mileage;
  const litersAfterFirst = f.slice(1).reduce((s,r)=>s+(+r.liters||0),0);
  const avg = dist>0 ? litersAfterFirst/dist*100 : null;
  const totalCost = f.reduce((s,r)=>s+(+r.cost||0),0);
  const eurPerKm = dist>0 ? f.slice(1).reduce((s,r)=>s+(+r.cost||0),0)/dist : null;
  // per-segment consumption for the chart
  const segments=[];
  for(let i=1;i<f.length;i++){ const d=f[i].mileage-f[i-1].mileage;
    if(d>0) segments.push({date:f[i].date||'', cons:(+f[i].liters||0)/d*100}); }
  return {avg, eurPerKm, segments, totalL:f.reduce((s,r)=>s+(+r.liters||0),0), totalCost, count:f.length};
}

function render(){
  const app=document.getElementById('app');

  const page=document.getElementById('page');
  if(ui.tab==='overview') page.innerHTML=overviewHTML();
  else if(ui.tab==='history') page.innerHTML=historyHTML();
  else if(ui.tab==='stats') page.innerHTML=statsHTML();
  page.innerHTML += toolsHTML();
  wireChrome();
  if(ui.tab==='overview') animateBars();
  if(ui.tab==='history') wireRecords();
}

/* ---- onboarding ---- */
function onboardingHTML(){

function wireOnboarding(){ document.getElementById('onbAdd').onclick=()=>openCarSheet(null); }

/* ---- topbar ---- */
function carAvatar(c,size){
  const initials = (c.make[0]||'')+(c.model[0]||'');
  return `<div class="car-av" style="width:${size}px;height:${size}px;background:linear-gradient(135deg,${c.color},${shade(c.color,-30)})">${esc(initials.toUpperCase())}</div>`;
}
function shade(hex,amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0'); }
function topbarHTML(){
  const c=activeCar();
  const name = (c.make+' '+c.model).trim();
  return `<header class="topbar"><div class="topbar-inner">
    <div class="car-switch" id="carSwitch">
      ${carAvatar(c,40)}
      <div class="car-info"><b>${esc(name)}</b><span>${c.year?c.year+' · ':''}${state.cars.length>1?state.cars.length+' авто в гараже':'твоя машина'}</span></div>
      <div class="chev">${SVG.chevDown}</div>
    </div>

  </div><div class="mstripe"></div></header>`;
}

/* ---- nav ---- */
function navHTML(){

  return `<nav class="nav">
    ${t('overview',SVG.home,'Обзор')}

}

/* ---- overview ---- */
function overviewHTML(){
  const recs=carRecords(), c=activeCar();
  const spent=recs.filter(r=>r.done).reduce((s,r)=>s+(+r.cost||0),0);
  const planned=recs.filter(r=>!r.done).reduce((s,r)=>s+(+r.cost||0),0);
  const fs=fuelStats();
  // next service reminder
  const rem=recs.filter(r=>r.type==='reminder'&&!r.done);
  let nextTxt='—',nextSub='нет активных';
  const remMile=rem.filter(r=>r.mileage!=null).sort((a,b)=>a.mileage-b.mileage);
  if(remMile.length){ const km=remMile[0].mileage-c.mileage; nextTxt=fmtN(remMile[0].mileage); nextSub= km>0?`через ~${fmtN(km)} км`:'пора!'; }
  else if(rem.length){ nextTxt=String(rem.length); nextSub='по дате'; }

  const A=ACCENT,AS='var(--accent-soft)';
  const cards=[
    {ic:SVG.euro,c:A,soft:AS,lbl:'Всего вложено',val:`${fmtN(spent)}<small> ${cur()}</small>`,sub:planned>0?`+ ${fmtN(planned)} ${cur()} в планах`:'за всё время'},
    {ic:SVG.drop,c:A,soft:AS,lbl:'Средний расход',val: fs.avg!=null?`${fs.avg.toFixed(1)}<small> л/100</small>`:'—',sub: fs.avg!=null?`${fs.count} заправок`:'нужно 2+ заправки'},
    {ic:SVG.service,c:A,soft:AS,lbl:'Записей ТО',val:String(recs.filter(r=>r.type==='service').length),sub:'обслуживаний'},
    {ic:SVG.reminder,c:A,soft:AS,lbl:'Следующее ТО',val:nextTxt,sub:nextSub}
  ];
  const statsHtml = cards.map(x=>`<div class="stat"><div class="ic" style="background:${x.soft};color:${x.c}">${x.ic}</div>
    <div class="lbl">${x.lbl}</div><div class="val">${x.val}</div><div class="sub">${x.sub}</div></div>`).join('');

  // breakdown
  const catKeys=['service','fuel','expense','upgrade'];
  const sums={}; let total=0;
  catKeys.forEach(t=>{sums[t]=recs.filter(r=>r.type===t).reduce((s,r)=>s+(+r.cost||0),0); total+=sums[t];});
  const max=Math.max(...catKeys.map(t=>sums[t]),1);
  const bars=catKeys.map(t=>{const T=TYPES[t];const w=sums[t]/max*100;
    return `<div class="bar-row"><div class="name"><span class="dot" style="background:${T.color}"></span>${T.label}</div>
    <div class="track"><div class="fill" style="background:${T.color}" data-w="${w}"></div></div>
    <div class="amt">${fmtN(sums[t])} ${cur()}</div></div>`;}).join('');

  // recent events
  const recent=recs.slice().sort(sortRecs).slice(0,4).map(cardHTML).join('') ||
    `<div class="empty">${SVG.inbox}<p>Пока нет записей. Жми + внизу, чтобы добавить заправку, ТО или расход.</p></div>`;

  return `<div class="sec-title">Обзор машины</div>
    <div class="stats">${statsHtml}</div>
    <div class="panel"><div class="panel-head"><h3>Расходы по категориям</h3><span class="tot">${fmtN(total)} ${cur()} всего</span></div><div class="bars">${bars}</div></div>
    <div class="sec-title">Последние события</div>
    <div class="records">${recent}</div>`;
}

/* ---- history ---- */
function historyHTML(){
  const recs=carRecords();
  const defs=[['all','Все'],['service','ТО'],['fuel','Заправки'],['expense','Расходы'],['upgrade','Улучшения'],['reminder','Напоминания']];
  const filters=defs.map(([k,l])=>{const cnt=k==='all'?recs.length:recs.filter(r=>r.type===k).length;
    return `<button class="chip ${ui.filter===k?'active':''}" data-f="${k}">${l}<span class="cnt">${cnt}</span></button>`;}).join('');
  let list=recs.filter(r=>ui.filter==='all'||r.type===ui.filter).slice().sort(sortRecs);
  const body= list.length? `<div class="records">${list.map(cardHTML).join('')}</div>`
    : `<div class="empty">${SVG.inbox}<p>Здесь пусто. Добавь первую запись кнопкой +.</p></div>`;
  return `<div class="sec-title">История</div><div class="filters">${filters}</div>${body}`;
}
function sortRecs(a,b){ if(a.done!==b.done) return a.done?1:-1;
  const da=a.date||'',db=b.date||''; if(da!==db) return db.localeCompare(da);
  return (b.mileage||0)-(a.mileage||0); }

function cardHTML(r){
  const T=TYPES[r.type]; const c=activeCar();
  let badge='';
  if(r.type==='upgrade'&&!r.done) badge='<span class="badge plan">В планах</span>';
  else if(r.type==='reminder'){ const km=r.mileage!=null?(r.mileage-c.mileage):null;
    badge=(km!=null&&km<=5000)?'<span class="badge soon">Скоро</span>':'<span class="badge sched">Запланировано</span>'; }
  const meta=[];
  if(r.date) meta.push(`<span class="tag">${SVG.calendar}${fmtDate(r.date)}</span>`);
  if(r.mileage!=null) meta.push(`<span class="tag">${SVG.gauge}${fmtN(r.mileage)} км</span>`);
  if(r.type==='fuel'&&r.liters) meta.push(`<span class="tag">${SVG.drop}${(+r.liters).toFixed(1)} л${r.cost&&r.liters?` · ${(r.cost/r.liters).toFixed(2)} ${cur()}/л`:''}</span>`);
  meta.push(`<span class="tag" style="color:${T.color};border-color:${T.color}33">${T.label}</span>`);
  const cost=(+r.cost>0)?`${fmtN(r.cost)} ${cur()}`:'—';
  const title = r.type==='fuel' && (!r.title || r.title==='Заправка') ? 'Заправка' : esc(r.title||TYPES[r.type].label);
  return `<div class="rec" data-id="${r.id}"><div class="ricon" style="background:${T.soft};color:${T.color}">${SVG[r.type]}</div>
    <div class="body"><div class="ttl">${title} ${badge}</div>
      ${r.note?`<div class="note">${esc(r.note)}</div>`:''}
      <div class="meta">${meta.join('')}</div></div>
    <div class="right"><div class="cost ${(+r.cost>0)?'':'zero'}">${cost}</div>
      <button class="del" aria-label="Удалить">${SVG.trash}</button></div></div>`;
}

/* ---- stats / charts ---- */
function statsHTML(){
  const recs=carRecords();
  if(!recs.length) return `<div class="sec-title">Статистика</div><div class="empty">${SVG.chart}<p>Добавь записи — и здесь появятся графики трат и расхода топлива.</p></div>`;
  // monthly spend
  const byMonth={};
  recs.filter(r=>r.date&&+r.cost>0).forEach(r=>{const k=r.date.slice(0,7); byMonth[k]=(byMonth[k]||0)+(+r.cost||0);});
  const months=Object.keys(byMonth).sort().slice(-8);
  const monthChart = months.length? barChart(months.map(m=>({label:m.slice(5)+'.'+m.slice(2,4),value:byMonth[m]})),ACCENT,cur())
    : `<div class="empty" style="padding:24px">${SVG.calendar}<p>Нужны записи с датой и стоимостью.</p></div>`;

  // fuel consumption line
  const fs=fuelStats();
  const fuelChart = fs.segments.length>=2 ? lineChart(fs.segments.map(s=>({label:s.date?fmtDate(s.date):'',value:s.cons})),ACCENT,'л/100')
    : `<div class="empty" style="padding:24px">${SVG.fuel}<p>${fs.count>=2?'Добавь ещё одну заправку — для графика динамики нужно 3+ полных бака подряд.':'Добавь минимум 2 заправки с пробегом, чтобы увидеть динамику расхода.'}</p></div>`;

  // category donut
  const catKeys=['service','fuel','expense','upgrade'];
  const segs=catKeys.map(t=>({label:TYPES[t].label,color:TYPES[t].color,value:recs.filter(r=>r.type===t).reduce((s,r)=>s+(+r.cost||0),0)})).filter(s=>s.value>0);
  const donut = segs.length? donutChart(segs) : `<div class="empty" style="padding:24px">${SVG.euro}<p>Пока нет трат.</p></div>`;

  const avgLine = fs.avg!=null ? `<div class="ch-sub">Средний: <b style="color:var(--accent)">${fs.avg.toFixed(1)} л/100км</b>${fs.eurPerKm!=null?` · ${fs.eurPerKm.toFixed(2)} ${cur()}/км`:''}</div>` : '';

  return `<div class="sec-title">Статистика</div>
    <div class="chart-card"><h3>Траты по месяцам</h3><div class="ch-sub">${cur()} в месяц по всем записям</div>${monthChart}</div>
    <div class="chart-card"><h3>Расход топлива</h3>${avgLine||'<div class="ch-sub">динамика л/100км между заправками</div>'}${fuelChart}</div>
    <div class="chart-card"><h3>Структура расходов</h3><div class="ch-sub">распределение по категориям</div>${donut}</div>`;
}

function barChart(data,color,unit){
  const W=600,H=180,pad=28,bw=Math.min(46,(W-pad*2)/data.length-12);
  const max=Math.max(...data.map(d=>d.value),1);
  const step=(W-pad*2)/data.length;
  let bars='',labels='';
  data.forEach((d,i)=>{const h=(d.value/max)*(H-50);const x=pad+i*step+(step-bw)/2;const y=H-30-h;
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="6" fill="${color}" opacity="0.9"><title>${d.label}: ${fmtN(d.value)} ${unit}</title></rect>`;
    bars+=`<text x="${x+bw/2}" y="${y-6}" fill="#8c95a6" font-size="11" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">${fmtN(d.value)}</text>`;
    labels+=`<text x="${x+bw/2}" y="${H-10}" fill="#5c6473" font-size="11" font-weight="600" text-anchor="middle">${d.label}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${bars}${labels}</svg>`;
}
function lineChart(data,color,unit){
  const W=600,H=180,pad=34;
  const max=Math.max(...data.map(d=>d.value))*1.1,min=Math.min(...data.map(d=>d.value))*0.9;
  const rng=(max-min)||1;const step=(W-pad*2)/Math.max(1,data.length-1);
  const pts=data.map((d,i)=>({x:pad+i*step,y:H-26-((d.value-min)/rng)*(H-56),...d}));
  const path=pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  const area=path+` L${pts[pts.length-1].x} ${H-26} L${pts[0].x} ${H-26} Z`;
  let dots='',labels='';
  pts.forEach((p,i)=>{dots+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${color}"><title>${p.value.toFixed(1)} ${unit}</title></circle>`;
    dots+=`<text x="${p.x}" y="${p.y-10}" fill="#8c95a6" font-size="10.5" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">${p.value.toFixed(1)}</text>`;
    if(i%Math.ceil(pts.length/5||1)===0||i===pts.length-1) labels+=`<text x="${p.x}" y="${H-8}" fill="#5c6473" font-size="10" text-anchor="middle">${p.label||''}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity="0.25"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#lg)"/><path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}${labels}</svg>`;
}
function donutChart(segs){
  const total=segs.reduce((s,x)=>s+x.value,0);const R=58,C=2*Math.PI*R;let off=0;
  const circles=segs.map(s=>{const frac=s.value/total;const len=frac*C;
    const el=`<circle cx="80" cy="80" r="${R}" fill="none" stroke="${s.color}" stroke-width="22" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 80 80)"><title>${s.label}: ${fmtN(s.value)} ${cur()}</title></circle>`;
    off+=len;return el;}).join('');
  const legend=segs.map(s=>`<div class="li" style="white-space:nowrap"><span class="dot" style="background:${s.color}"></span>${s.label}&nbsp;<b style="color:var(--text)">${fmtN(s.value)} ${cur()}</b></div>`).join('');
  return `<div class="donut-wrap"><svg viewBox="0 0 160 160" style="width:160px;height:160px;flex-shrink:0">${circles}
    <text x="80" y="74" fill="#f4f6fa" font-size="20" font-weight="800" text-anchor="middle" font-family="Manrope">${fmtN(total)}</text>
    <text x="80" y="94" fill="#8c95a6" font-size="11" font-weight="600" text-anchor="middle">${cur()} всего</text></svg>
    <div class="legend" style="flex-direction:column;gap:10px">${legend}</div></div>`;
}

function toolsHTML(){
  return `<div class="tools">
    <button class="tool-btn" id="exportBtn">${SVG.download}Экспорт</button>
    <button class="tool-btn" id="importBtn">${SVG.upload}Импорт</button>
  </div>`;
}

/* ============ WIRING ============ */
function wireChrome(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{ui.tab=b.dataset.tab;render();});
  document.getElementById('navAdd').onclick=()=>openRecSheet(null);
  document.getElementById('carSwitch').onclick=openSwitch;
  document.getElementById('odoChip').onclick=editOdo;
  document.getElementById('exportBtn').onclick=doExport;
  document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
}
function wireRecords(){
  document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{ui.filter=b.dataset.f;render();});
  document.querySelectorAll('.rec').forEach(el=>{
    el.querySelector('.del').onclick=e=>{e.stopPropagation();delRec(el.dataset.id);};

  });

// overview recent cards also clickable
document.addEventListener('click',e=>{
  const rec=e.target.closest('.rec'); if(!rec) return;
  if(ui.tab!=='overview') return;
  if(e.target.closest('.del')){ e.stopPropagation(); delRec(rec.dataset.id); return; }
  openRecSheet(rec.dataset.id);
});

function editOdo(){ const c=activeCar(); const v=prompt('Текущий пробег, км:',c.mileage);
  if(v!=null&&v.trim()!==''){const n=parseInt(v.replace(/\D/g,''));if(!isNaN(n)){c.mileage=n;save();render();}} }

/* ---- record sheet ---- */
const recOv=document.getElementById('recOverlay');
function renderTypeGrid(){
  document.getElementById('typeGrid').innerHTML=Object.entries(TYPES).map(([k,T])=>
    `<div class="type-opt ${ui.recType===k?'sel':''}" data-t="${k}" style="color:${T.color}">${SVG[k]}<span>${T.label}</span></div>`).join('');
  document.querySelectorAll('.type-opt').forEach(o=>o.onclick=()=>{ui.recType=o.dataset.t;renderTypeGrid();applyTypeUI();});
}
function applyTypeUI(){
  const isFuel=ui.recType==='fuel';
  document.getElementById('fuelFields').style.display=isFuel?'block':'none';
  document.getElementById('lblTitle').parentElement.style.display=isFuel?'none':'block';
  document.getElementById('lblCost').textContent= isFuel?`Сумма заправки, ${cur()}`:`Стоимость, ${cur()}`;
  const lbl=document.getElementById('toggleLabel'),sub=document.getElementById('toggleSub'),tog=document.getElementById('doneToggle');
  if(ui.recType==='reminder'){tog.style.display='none';}
  else {tog.style.display='flex';
    if(ui.recType==='upgrade'){lbl.textContent='Уже установлено';sub.textContent='иначе — «в планах»';}
    else if(isFuel){lbl.textContent='Полный бак';sub.textContent='для точного расчёта расхода';}
    else {lbl.textContent='Выполнено';sub.textContent='уже сделано / оплачено';}}
  updateFuelCalc();
}
function updateFuelCalc(){
  if(ui.recType!=='fuel'){document.getElementById('fuelCalc').classList.remove('show');return;}
  const L=parseFloat(document.getElementById('fLiters').value);
  const ppl=parseFloat(document.getElementById('fPpl').value);
  const box=document.getElementById('fuelCalc');
  if(L>0&&ppl>0){ const sum=L*ppl; document.getElementById('fCost').value=sum.toFixed(2);
    box.textContent=`≈ ${sum.toFixed(2)} ${cur()} за ${L.toFixed(1)} л`; box.classList.add('show'); }
  else box.classList.remove('show');
}
function setRecToggle(v){ui.recDone=v;document.getElementById('doneToggle').classList.toggle('on',v);}
function openRecSheet(id){
  ui.editRec=id||null;
  const f={t:'fTitle',n:'fNote',d:'fDate',m:'fMileage',c:'fCost',l:'fLiters',p:'fPpl'};
  document.getElementById('recDelete').style.display=id?'block':'none';
  if(id){const r=state.records.find(x=>x.id===id);ui.recType=r.type;setRecToggle(!!r.done);
    document.getElementById('recTitle').textContent='Редактировать';
    document.getElementById('fTitle').value=r.title||'';document.getElementById('fNote').value=r.note||'';
    document.getElementById('fDate').value=r.date||'';document.getElementById('fMileage').value=r.mileage??'';
    document.getElementById('fCost').value=r.cost||'';document.getElementById('fLiters').value=r.liters??'';
    document.getElementById('fPpl').value=(r.liters&&r.cost)?(r.cost/r.liters).toFixed(2):'';
  } else {ui.recType='service';setRecToggle(true);document.getElementById('recTitle').textContent='Новая запись';
    document.getElementById('recForm').reset();
    document.getElementById('fDate').value=new Date().toISOString?.().slice(0,10)||'';
  }
  renderTypeGrid();applyTypeUI();
  recOv.classList.add('open');document.body.style.overflow='hidden';
}
function closeRec(){recOv.classList.remove('open');document.body.style.overflow='';}
document.getElementById('fLiters').oninput=updateFuelCalc;
document.getElementById('fPpl').oninput=updateFuelCalc;
document.getElementById('recCancel').onclick=closeRec;
document.getElementById('doneToggle').onclick=()=>setRecToggle(!ui.recDone);
document.getElementById('recDelete').onclick=()=>{if(ui.editRec){delRec(ui.editRec,true);closeRec();}};
recOv.onclick=e=>{if(e.target.id==='recOverlay')closeRec();};
document.getElementById('recForm').onsubmit=e=>{
  e.preventDefault();
  const isFuel=ui.recType==='fuel';
  const liters=isFuel?parseFloat(document.getElementById('fLiters').value)||0:undefined;
  const title=isFuel?'Заправка':document.getElementById('fTitle').value.trim();
  if(!isFuel&&!title)return;
  const rec={id:ui.editRec||uid(),carId:state.activeCarId,type:ui.recType,title,
    note:document.getElementById('fNote').value.trim(),
    date:document.getElementById('fDate').value||'',
    mileage:document.getElementById('fMileage').value!==''?parseInt(document.getElementById('fMileage').value):null,
    cost:document.getElementById('fCost').value!==''?parseFloat(document.getElementById('fCost').value):0,
    done:ui.recType==='reminder'?false:ui.recDone};
  if(isFuel)rec.liters=liters;
  if(ui.editRec){const i=state.records.findIndex(x=>x.id===ui.editRec);state.records[i]=rec;}
  else state.records.unshift(rec);
  // bump odometer if this record has a higher mileage
  if(rec.mileage!=null){const c=activeCar();if(rec.mileage>c.mileage)c.mileage=rec.mileage;}
  save();closeRec();render();
};
function delRec(id,silent){const r=state.records.find(x=>x.id===id);
  if(silent||confirm(`Удалить «${r.title||'запись'}»?`)){state.records=state.records.filter(x=>x.id!==id);save();render();}}

/* ---- car color picker ---- */
const COLOR_PRESETS=['#5b9dff','#7fb4ff','#3d7fd0','#2b5f9e','#1f4d80','#cbd5e1','#94a3b8','#64748b','#e2e8f0','#ffffff'];
const cColorEl=document.getElementById('cColor'), cColorText=document.getElementById('cColorText');
function isHex(v){return /^#[0-9a-fA-F]{6}$/.test(v);}
function setCarColor(val,from){
  if(!isHex(val)) return;
  if(from!=='picker') cColorEl.value=val.toLowerCase();
  if(from!=='text') cColorText.value=val.toUpperCase();
  document.querySelectorAll('.sw-dot').forEach(d=>d.classList.toggle('on',d.dataset.c.toLowerCase()===val.toLowerCase()));
}
function renderSwatches(){
  document.getElementById('swatches').innerHTML=COLOR_PRESETS.map(c=>`<div class="sw-dot" data-c="${c}" style="background:${c}" title="${c}"></div>`).join('');
  document.querySelectorAll('.sw-dot').forEach(d=>d.onclick=()=>setCarColor(d.dataset.c,'swatch'));
}
cColorEl.oninput=()=>setCarColor(cColorEl.value,'picker');
cColorText.oninput=()=>{let v=cColorText.value.trim();if(v&&v[0]!=='#')v='#'+v;if(isHex(v))setCarColor(v,'text');};

/* ---- car sheet ---- */
const carOv=document.getElementById('carOverlay');
function openCarSheet(id){
  ui.editCar=id||null;
  document.getElementById('carDelete').style.display=(id&&state.cars.length>1)?'block':'none';
  renderSwatches();
  if(id){const c=state.cars.find(x=>x.id===id);document.getElementById('carTitle').textContent='Редактировать авто';
    cMake.value=c.make;cModel.value=c.model||'';cYear.value=c.year||'';cMileage.value=c.mileage||'';
    cPlate.value=c.plate||'';cCurrency.value=c.currency||'€';cEngine.value=c.engine||'';cBought.value=c.bought||'';
    setCarColor(c.color||'#5b9dff');
  } else {document.getElementById('carTitle').textContent='Добавить авто';document.getElementById('carForm').reset();cCurrency.value='€';setCarColor('#5b9dff');}
  closeSwitch();
  carOv.classList.add('open');document.body.style.overflow='hidden';
}
function closeCar(){carOv.classList.remove('open');document.body.style.overflow='';}
document.getElementById('carCancel').onclick=closeCar;
carOv.onclick=e=>{if(e.target.id==='carOverlay')closeCar();};
document.getElementById('carForm').onsubmit=e=>{
  e.preventDefault();
  const c={id:ui.editCar||uid(),make:cMake.value.trim(),model:cModel.value.trim(),
    year:cYear.value?parseInt(cYear.value):null,mileage:cMileage.value?parseInt(cMileage.value):0,
    plate:cPlate.value.trim(),currency:cCurrency.value,engine:cEngine.value.trim(),bought:cBought.value,color:cColor.value};
  if(!c.make)return;
  if(ui.editCar){const i=state.cars.findIndex(x=>x.id===ui.editCar);state.cars[i]=c;}
  else {state.cars.push(c);state.activeCarId=c.id;}
  save();closeCar();render();
};
document.getElementById('carDelete').onclick=()=>{
  if(state.cars.length<=1)return;
  const c=state.cars.find(x=>x.id===ui.editCar);
  if(confirm(`Удалить «${(c.make+' '+c.model).trim()}» и все её записи?`)){
    state.cars=state.cars.filter(x=>x.id!==ui.editCar);
    state.records=state.records.filter(r=>r.carId!==ui.editCar);
    if(state.activeCarId===ui.editCar)state.activeCarId=state.cars[0].id;
    save();closeCar();render();}
};

/* ---- switch sheet ---- */
const switchOv=document.getElementById('switchOverlay');
function openSwitch(){
  document.getElementById('carList').innerHTML=state.cars.map(c=>{
    const name=(c.make+' '+c.model).trim();
    return `<div class="car-list-item ${c.id===state.activeCarId?'active':''}" data-car="${c.id}">
      ${carAvatar(c,40)}<div class="car-info"><b>${esc(name)}</b><span>${fmtN(c.mileage)} км${c.year?' · '+c.year:''}</span></div>
      <button class="ed" data-edit="${c.id}" aria-label="Изменить">${SVG.edit}</button></div>`;}).join('');
  document.querySelectorAll('[data-car]').forEach(el=>el.onclick=ev=>{
    if(ev.target.closest('[data-edit]'))return;
    state.activeCarId=el.dataset.car;ui.tab='overview';ui.filter='all';save();closeSwitch();render();});
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=ev=>{ev.stopPropagation();openCarSheet(b.dataset.edit);});
  switchOv.classList.add('open');document.body.style.overflow='hidden';
}
function closeSwitch(){switchOv.classList.remove('open');document.body.style.overflow='';}
document.getElementById('addCarBtn2').onclick=()=>openCarSheet(null);
switchOv.onclick=e=>{if(e.target.id==='switchOverlay')closeSwitch();};

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeRec();closeCar();closeSwitch();}});

/* ---- export/import ---- */
function doExport(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='garage-'+(new Date().toISOString?.().slice(0,10)||'backup')+'.json';a.click();URL.revokeObjectURL(a.href);
}
document.getElementById('importFile').onchange=e=>{
  const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);
    if(d.cars&&d.records){state=d;}
    else if(Array.isArray(d.records)){state.records=d.records;}
    save();render();
  }catch(err){alert('Не удалось прочитать файл');}};
  rd.readAsText(f);e.target.value='';
};

render();
</script>
